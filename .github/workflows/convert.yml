name: HTML to PNG

on:
  push:
    paths:
      - 'input/**'
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # 🎯 خطوة إضافية لضمان وجود الفولدرات قبل الشغل
      - name: Prepare Workspace
        run: mkdir -p input output temp

      - name: Install Dependencies
        run: |
          npm install puppeteer adm-zip

      - name: Run Conversion Script
        run: node convert.js

      - name: Check Generated Files
        run: |
          echo "Listing files in output directory:"
          ls -R output/ # الـ -R هتخلينا نشوف اللي جوه الفولدرات كمان

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # بنضيف كل حاجة في الـ output والـ temp (لو الصور لسه هناك)
          git add output/*.zip --force
          
          # تنظيف الـ input
          git rm input/*.zip --ignore-unmatch || true
          
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "✅ Carousel Generated: $(date +'%Y-%m-%d %H:%M')"
            git pull --rebase origin main
            git push origin main || (git pull --rebase origin main && git push origin main)
          else
            echo "No changes to commit."
          fi
          
