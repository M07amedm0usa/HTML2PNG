name: HTML to PNG

on:
  push:
    paths:
      - 'input/**'
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Prepare Workspace
        run: mkdir -p input output temp

      # ✅ إضافة .gitignore يتجاهل node_modules
      - name: Create .gitignore
        run: |
          cat >> .gitignore << 'EOF'
          node_modules/
          package-lock.json
          package.json
          temp/
          EOF

      - name: Install Dependencies
        run: npm install puppeteer adm-zip

      - name: Run Conversion Script
        run: |
          node convert.js
          echo "EXIT_CODE=$?" >> $GITHUB_ENV

      - name: Check Generated Files
        run: |
          echo "📂 Output directory contents:"
          ls -R output/ || echo "⚠️ Output is empty!"
          
          # ✅ لو output فاضي نوقف الـ workflow هنا
          if [ -z "$(ls -A output/ 2>/dev/null)" ]; then
            echo "❌ No PNG files generated — check convert.js logs"
            exit 1
          fi

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # ✅ بنضيف output بس — مش كل حاجة
          git add output/ --force
          git rm input/*.zip --ignore-unmatch || true
          
          # ✅ الـ check بيبص على output بس مش node_modules
          if [ -n "$(git diff --cached --name-only)" ]; then
            git commit -m "✅ Carousel Generated: $(date +'%Y-%m-%d %H:%M')"
            git pull --rebase origin main
            git push origin main || (git pull --rebase origin main && git push origin main)
            echo "✅ Push successful!"
          else
            echo "ℹ️ No new files in output — skipping commit."
          fi

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-output
          path: output/
          retention-days: 1
