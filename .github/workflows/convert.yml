name: HTML to PNG

on:
  push:
    paths:
      - 'input/**'
  workflow_dispatch: # للسماح بتشغيل الأكشن برمجياً عبر الـ API

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Arabic Fonts & Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-kacst fonts-arabeyes fonts-noto-core fonts-noto-extra
          
      - run: npm install puppeteer adm-zip

      - run: node convert.js

      - uses: actions/upload-artifact@v4
        with:
          name: png-zips
          path: output/*.zip

      - name: Cleanup input
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git rm input/*.zip || true
          git diff --staged --quiet || (git commit -m "🧹 cleanup input" && git push)
          
