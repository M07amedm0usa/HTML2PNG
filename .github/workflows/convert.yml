name: HTML to PNG

on:
  push:
    paths:
      - 'input/**'
  workflow_dispatch: # للسماح بتشغيل الأكشن برمجياً عبر الـ API

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Arabic Fonts & Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-kacst fonts-arabeyes fonts-noto-core fonts-noto-extra
          
      - run: npm install puppeteer adm-zip

      - run: node convert.js

      - uses: actions/upload-artifact@v4
        with:
          name: png-zips
          path: output/*.zip
          
      - name: Send ZIP back to n8n
        run: |
          ZIP_FILE=$(ls output/*.zip | head -n 1)
          curl -X POST -F "data=@$ZIP_FILE" https://two-beans-raise.loca.lt/webhook-test/6193a5a3-43be-4258-9fad-b8d5702a2d8e
          

      - name: Cleanup input
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git rm input/*.zip || true
          git diff --staged --quiet || (git commit -m "🧹 cleanup input" && git push)
          
