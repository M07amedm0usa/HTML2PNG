name: HTML to PNG

on:
  push:
    paths:
      - 'input/**'
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Arabic Fonts & Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-kacst fonts-arabeyes fonts-noto-core fonts-noto-extra
          npm install puppeteer adm-zip

      - run: node convert.js

      - uses: actions/upload-artifact@v4
        with:
          name: png-zips
          path: output/*.zip
          
      - name: Save Output to Repo & Cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # إجبار جيت هاب إنه يضيف أي ملف ZIP جديد في فولدر output
          git add output/*.zip --force
          
          # مسح ملف الـ ZIP القديم من فولدر input 
          git rm input/*.zip || true
          
          # عمل Commit وسحب التحديثات (Pull) لو فيه، وبعدين الرفع (Push)
          git diff --staged --quiet || (git commit -m "✅ Images converted and ZIP generated" && git pull --rebase origin main && git push)
          
