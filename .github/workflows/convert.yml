name: HTML to PNG

on:
  push:
    paths:
      - 'input/**'
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # تأمين وجود الفولدرات عشان السكريبت ميتلخبطش
      - name: Prepare Workspace
        run: mkdir -p input output temp

      - name: Install Dependencies
        run: |
          npm install puppeteer adm-zip

      - name: Run Conversion Script
        run: node convert.js

      - name: Check Generated Files
        run: |
          echo "Listing files in output directory:"
          ls -R output/ || echo "Output is empty!"

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 🎯 التعديل السحري: إضافة الفولدر كله والسكوت عن الأخطاء لو فاضي
          git add output/ --force 2>/dev/null || true
          
          # تنظيف الـ input عشان ميتراكمش ملفات قديمة
          git rm input/*.zip --ignore-unmatch || true
          
          # التحقق لو فيه تغييرات فعلاً قبل ما يعمل Commit
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "✅ Carousel Generated: $(date +'%Y-%m-%d %H:%M')"
            
            # محاولة الرفع مع rebase لتفادي الـ Conflicts مع n8n
            git pull --rebase origin main
            git push origin main || (git pull --rebase origin main && git push origin main)
          else
            echo "No changes detected. Skipping commit."
          fi

      # خطوة إضافية اختيارية: لو عايز تشوف الصور في الـ Artifacts لو الرفع فشل
      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-output
          path: output/
          retention-days: 1
