name: HTML to PNG

on:
  push:
    paths:
      - 'input/**'
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0 # مهم جداً عشان الـ rebase يشتغل صح

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Arabic Fonts & Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-kacst fonts-arabeyes fonts-noto-core fonts-noto-extra fonts-vazirmatn
          npm install puppeteer adm-zip

      - name: Run Conversion Script
        run: node convert.js

      - name: Check Generated Files
        run: |
          echo "Listing files in output directory:"
          ls -lh output/ || echo "Output directory is empty!"

      - name: Commit and Push Changes
        run: |
          # إعداد بيانات البوت
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # إضافة الملفات الناتجة (الصور والـ ZIP)
          git add output/* --force
          
          # تنظيف ملفات الـ input
          git rm input/*.zip --ignore-unmatch || true
          
          # التحقق من وجود تغييرات
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "✅ Carousel Generated: $(date +'%Y-%m-%d %H:%M')"
            
            # --- السحر هنا ---
            # سحب أي تغييرات حصلت في الريبو (زي مسح الصور القديمة اللي n8n عمله)
            # ووضع التغييرات الجديدة للأكشن "فوقيها" عشان نتجنب الـ Conflict
            git pull --rebase origin main
            
            # محاولة الرفع، وإذا فشل يعيد المحاولة مرة واحدة بعد rebase أخير
            git push origin main || (git pull --rebase origin main && git push origin main)
          else
            echo "No changes to commit, skipping push."
          fi

      - name: Upload Artifact (Optional Backup)
        uses: actions/upload-artifact@v4
        with:
          name: generated-carousels
          path: output/*.zip
          retention-days: 1
