<!DOCTYPE html><html dir="rtl">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #030712; --card: #111827; --card-border: #1f2937; --text: #f8fafc; --sub: #94a3b8; --accent: #00d4ff; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 1080px; height: 1350px; background: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; overflow: hidden; padding: 60px 70px; display: flex; flex-direction: column; }
    
    body::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 400px; background: radial-gradient(100% 100% at 50% 0%, rgba(124,58,237,0.15) 0%, transparent 100%); z-index: -1; pointer-events: none; }
    
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; background: rgba(17, 24, 39, 0.6); padding: 15px 30px; border-radius: 100px; backdrop-filter: blur(10px); border: 1px solid var(--card-border); }
    .logo { font-weight: 900; color: var(--text); font-size: 26px; letter-spacing: 2px; display: flex; align-items: center; gap: 10px; direction: ltr; }
    .logo span { color: var(--accent); }
    .badge { background: linear-gradient(135deg, #7c3aed, var(--accent)); padding: 8px 25px; border-radius: 50px; font-weight: 800; font-size: 20px; text-transform: uppercase; letter-spacing: 1px; }

    .title-area { margin-bottom: 40px; }
    .main-title { font-size: 54px; font-weight: 900; color: var(--accent); margin-bottom: 12px; line-height: 1.2; }
    .sub-title { font-size: 26px; color: var(--sub); line-height: 1.6; font-weight: 600; }

    .content-flex-container { display: flex; flex-direction: column; gap: 24px; flex-grow: 1; min-height: 0; }
    .justify-center { justify-content: center; }

    .prop-card { background: var(--card); border-radius: 24px; padding: 30px; border: 1px solid var(--card-border); box-shadow: 0 10px 30px rgba(0,0,0,0.4); display: flex; flex-direction: column; min-height: 0; }
    .prop-header { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; }
    .prop-icon { width: 65px; height: 65px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 30px; }
    .prop-info { flex: 1; }
    .prop-name { font-size: 30px; font-weight: 800; font-family: 'Fira Code', monospace; margin-bottom: 4px; direction: ltr; }
    .prop-exp { font-size: 22px; color: var(--sub); font-weight: 600; }
    
    .prop-code { background: #0d1117; border-radius: 16px; padding: 25px; direction: ltr; border: 1px solid #30363d; overflow: hidden; flex-grow: 1; display: flex; align-items: center; }
    pre { font-family: 'Fira Code', monospace; font-size: 21px; line-height: 1.6; white-space: pre-wrap; word-wrap: break-word; width: 100%; margin: 0; font-weight: 500; text-align: left; }

    .tip-card { background: linear-gradient(135deg, rgba(17,24,39,0.9), rgba(31,41,55,0.9)); border: 1px solid rgba(124,58,237,0.4); padding: 40px; border-radius: 30px; display: flex; gap: 30px; align-items: center; position: relative; overflow: hidden; }
    .tip-card::after { content: ''; position: absolute; top: 0; left: auto; right: 0; width: 8px; height: 100%; background: #7c3aed; }
    .tip-icon-container { font-size: 55px; background: rgba(124,58,237,0.1); padding: 20px; border-radius: 20px; }
    .tip-text { font-size: 30px; font-weight: 700; line-height: 1.6; color: #f8fafc; }

    .cs-table { width: 100%; border-collapse: separate; border-spacing: 0; background: var(--card); border-radius: 24px; overflow: hidden; border: 1px solid var(--card-border); }
    .cs-table th { background: rgba(31,41,55,0.8); color: var(--accent); padding: 25px 35px; text-align: right; font-size: 26px; font-weight: 800; border-bottom: 2px solid var(--card-border); text-transform: uppercase; }
    .cs-table td { padding: 22px 35px; border-bottom: 1px solid var(--card-border); font-size: 24px; font-weight: 600; }
    .cs-prop { font-family: 'Fira Code', monospace; color: #9cdcfe; font-weight: 600; width: 40%; direction: ltr; text-align: left; }

    .intro-box { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    .intro-title { font-size: 140px; font-weight: 900; font-family: 'Fira Code', monospace; color: transparent; -webkit-text-stroke: 2px var(--accent); background: linear-gradient(135deg, #00d4ff, #7c3aed); -webkit-background-clip: text; margin-bottom: 30px; }
    .intro-desc { font-size: 42px; color: var(--sub); line-height: 1.5; font-weight: 600; max-width: 800px; }
    .intro-icon { font-size: 120px; margin-top: 60px; }

    .outro-minimal-container { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; gap: 35px; }
    
    .question-section { display: flex; flex-direction: column; align-items: center; text-align: center; max-width: 850px; width: 100%; }
    .q-title-clean { font-size: 30px; color: var(--sub); margin-bottom: 20px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
    
    .challenge-tasks-container { list-style: none; padding: 0; margin: 0 auto 25px auto; display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 750px; }
    .challenge-task-card { display: flex; align-items: flex-start; gap: 15px; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); padding: 18px 25px; border-radius: 16px; text-align: start; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
    .task-icon { font-size: 26px; line-height: 1.4; flex-shrink: 0; color: var(--accent); }
    .task-text { font-size: 26px; font-weight: 700; color: #f8fafc; line-height: 1.5; }
    
    .mac-code-window { width: 100%; max-width: 750px; border-radius: 12px; overflow: hidden; box-shadow: 0 15px 40px rgba(0,0,0,0.5); border: 1px solid #30363d; margin-bottom: 30px; }
    .mac-header { background: #161b22; padding: 12px 15px; display: flex; gap: 8px; border-bottom: 1px solid #30363d; direction: ltr; }
    .mac-dot { width: 14px; height: 14px; border-radius: 50%; }
    .mac-dot.red { background: #ff5f56; }
    .mac-dot.yellow { background: #ffbd2e; }
    .mac-dot.green { background: #27c93f; }
    .challenge-code-inner { border: none !important; border-radius: 0 !important; margin: 0 !important; }

    .code-span { font-family: 'Fira Code', monospace; font-weight: 600; color: var(--accent); background: rgba(0,212,255,0.1); padding: 4px 10px; border-radius: 6px; margin: 0 4px;}
    .comment-prompt-hint { font-size: 22px; color: #cbd5e1; font-weight: 700; display: inline-block; padding: 12px 25px; border-radius: 50px; background-color: rgba(255,255,255,0.05); border: 1px dashed rgba(255,255,255,0.2); }
    
    .cta-minimal-row { display: flex; gap: 20px; width: 100%; justify-content: center; }
    .cta-minimal-btn { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 18px 35px; border-radius: 50px; font-size: 24px; font-weight: 800; max-width: 320px; transition: transform 0.2s;}
    .save-btn { background: transparent; border: 2px solid var(--card-border); color: #94a3b8; }
    .follow-btn { background: linear-gradient(135deg, #7c3aed, var(--accent)); color: #fff; box-shadow: 0 8px 25px rgba(124,58,237,0.3); border: none; }

    .footer { margin-top: auto; display: flex; justify-content: space-between; align-items: center; color: #475569; font-size: 24px; font-weight: 700; padding-top: 30px; border-top: 2px dashed rgba(71,85,105,0.3); }
    .handle { font-family: 'Fira Code', monospace; display: flex; align-items: center; gap: 8px; direction: ltr; }
    .handle span { color: var(--accent); font-size: 28px; }
    .swipe { display: flex; align-items: center; gap: 10px; background: rgba(71,85,105,0.1); padding: 8px 20px; border-radius: 30px; }
  </style>
</head>
<body>
  <div class="slide">
    <div class="header">
      <div class="logo">FLUTTER<span>BY</span>MOUSA</div>
      <div class="badge">العربية</div>
    </div>
    
    
    
    
      <div class="intro-box">
        <h1 class="intro-title">SizedBox</h1>
        <p class="intro-desc">التحكم في المساحات أسهل مما تتخيل!</p>
        <div class="intro-icon">🚀</div>
      </div>
    
    <div class="footer">
      <div class="handle"><span>@</span>flutterbymousa</div>
      <div class="swipe">اسحب للمزيد ←</div>
    </div>
  </div>
</body>
</html>
